name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: YT-Music-Downloader-Windows
          - os: macos-latest
            name: macOS
            artifact: YT-Music-Downloader-macOS
          - os: ubuntu-latest
            name: Linux
            artifact: YT-Music-Downloader-Linux

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install ffmpeg -y
          refreshenv

      - name: Install Python dependencies
        run: pip install customtkinter yt-dlp Pillow requests pyinstaller

      - name: Find FFmpeg path (Unix)
        if: runner.os != 'Windows'
        id: ffmpeg_unix
        shell: bash
        run: |
          FFMPEG_PATH=$(which ffmpeg)
          FFMPEG_DIR=$(dirname "$FFMPEG_PATH")
          echo "dir=$FFMPEG_DIR" >> "$GITHUB_OUTPUT"
          echo "FFmpeg found at: $FFMPEG_DIR"

      - name: Find FFmpeg path (Windows)
        if: runner.os == 'Windows'
        id: ffmpeg_win
        shell: powershell
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $ffmpegPath = (Get-Command ffmpeg).Source
          $ffmpegDir = Split-Path $ffmpegPath
          echo "dir=$ffmpegDir" >> $env:GITHUB_OUTPUT
          echo "FFmpeg found at: $ffmpegDir"

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: YT-MP3-Downloader-main
        shell: powershell
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $ffmpegDir = "${{ steps.ffmpeg_win.outputs.dir }}"
          pyinstaller --onefile --noconsole `
            --name "YTMusicDownloader" `
            --icon temp_icon.ico `
            --add-binary "$ffmpegDir\ffmpeg.exe;." `
            main.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        working-directory: YT-MP3-Downloader-main
        run: |
          pyinstaller --onefile --noconsole \
            --name "YTMusicDownloader" \
            --add-binary "${{ steps.ffmpeg_unix.outputs.dir }}/ffmpeg:." \
            main.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        working-directory: YT-MP3-Downloader-main
        run: |
          pyinstaller --onefile --noconsole \
            --name "YTMusicDownloader" \
            --add-binary "${{ steps.ffmpeg_unix.outputs.dir }}/ffmpeg:." \
            main.py

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path "YT-MP3-Downloader-main/dist/YTMusicDownloader.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd YT-MP3-Downloader-main/dist
          zip "../../${{ matrix.artifact }}.zip" YTMusicDownloader

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Windows/*.zip
            macOS/*.zip
            Linux/*.zip
